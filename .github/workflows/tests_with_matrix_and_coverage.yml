name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  run-core-tests:
    name: "Run core tests (poetry with cache and coverage) (py${{ matrix.python-version }})"
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.14"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      # cache poetry (optional)
      - name: Cache Poetry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pypoetry
            .venv
          key: poetry-${{ runner.os }}-${{ matrix.python-version }}-${{ hashFiles('**/poetry.lock') }}

      - name: Install Poetry
        run: |
          pipx install poetry
          poetry config virtualenvs.in-project true

      - name: Install dependencies
        run: poetry install --with dev --no-interaction

      - name: Run tests with coverage
        run: poetry run pytest tests --cov=python_actions_demo --cov-report=xml --cov-report=term-missing

      # upload to some platform for viewing
      - name: Upload Coverage
        if: true # disable for now
        uses: codecov/codecov-action@v4
        with:
          file: coverage.xml
